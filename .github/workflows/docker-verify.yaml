name: Verify Docker image

on:
  workflow_run:
    workflows: ["Build and Push Docker image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to test'
        default: 'latest'
        required: false

jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set image ref
      run: echo "IMAGE=livewireholdings/dbp:${{ github.event.inputs.tag || 'latest' }}" >> $GITHUB_ENV

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Check manifest — both platforms present
      run: |
        MANIFEST=$(docker buildx imagetools inspect ${{ env.IMAGE }})
        echo "$MANIFEST"
        echo "$MANIFEST" | grep -q "linux/amd64" || (echo "ERROR: linux/amd64 missing from manifest" && exit 1)
        echo "$MANIFEST" | grep -q "linux/arm64" || (echo "ERROR: linux/arm64 missing from manifest" && exit 1)
        echo "Both platforms confirmed in manifest"

    - name: Smoke test — amd64
      run: docker run --rm --platform linux/amd64 ${{ env.IMAGE }} version

    - name: Smoke test — arm64
      run: docker run --rm --platform linux/arm64 ${{ env.IMAGE }} version

    - name: Functional test — amd64
      run: |
        docker run --rm --platform linux/amd64 \
          -v ${{ github.workspace }}/testdata/env/sqlite/patches:/patches \
          ${{ env.IMAGE }} validate -f /patches

    - name: Functional test — arm64
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}/testdata/env/sqlite/patches:/patches \
          ${{ env.IMAGE }} validate -f /patches
